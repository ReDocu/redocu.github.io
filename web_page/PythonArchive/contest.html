<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>대회 아카이브 - Python Algorithm Archive</title>
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("algoArchive.theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  </script>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/data.js"></script>
  <script defer src="js/contest.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html" aria-label="메인으로 이동">
      <span class="brand-mark">Py</span>
      <span>
        <strong>Python Archive</strong>
        <small>contest review</small>
      </span>
    </a>
    <nav class="nav">
      <a href="index.html">문제</a>
      <a href="basics.html">기초 개념</a>
      <a class="active" href="contest.html">대회</a>
      <a href="admin.html">관리</a>
    </nav>
    <button class="icon-button" id="themeToggle" type="button" aria-label="다크모드 전환" title="다크모드 전환">
      <span data-theme-icon>☾</span>
    </button>
  </header>

  <main class="shell">
    <section class="page-head">
      <div>
        <p class="eyebrow">대회별 복습</p>
        <h1>대회 문제 진행 현황</h1>
        <p class="lead">대회 단위로 풀이 상태, 제출 결과, 개선 포인트를 관리합니다.</p>
      </div>
      <div class="stat-strip">
        <div>
          <strong id="contestTotal">0</strong>
          <span>대회</span>
        </div>
        <div>
          <strong id="problemTotal">0</strong>
          <span>문제</span>
        </div>
        <div>
          <strong id="solvedTotal">0</strong>
          <span>정답</span>
        </div>
      </div>
    </section>

    <section class="toolbar" aria-label="대회 검색과 필터">
      <label class="field search-field">
        <span>검색</span>
        <input id="contestSearch" type="search" placeholder="대회명, 플랫폼, 태그 검색">
      </label>
      <label class="field">
        <span>플랫폼</span>
        <select id="platformFilter">
          <option value="">전체</option>
        </select>
      </label>
      <label class="field">
        <span>정렬</span>
        <select id="sortSelect">
          <option value="date-desc">날짜 최신순</option>
          <option value="date-asc">날짜 오래된순</option>
          <option value="progress-desc">진행률 높은순</option>
          <option value="progress-asc">진행률 낮은순</option>
        </select>
      </label>
    </section>

    <section>
      <div class="section-line">
        <h2>대회 목록</h2>
        <span id="contestResultCount" class="muted">0개</span>
      </div>
      <div id="contestGrid" class="contest-grid"></div>
      <p id="contestEmpty" class="empty-state" hidden>조건에 맞는 대회가 없습니다.</p>
    </section>
  </main>
</body>
</html>
